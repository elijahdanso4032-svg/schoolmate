{% extends "base.html" %}
{% block title %}Ask AI — SchoolMate{% endblock %}
{% block content %}
<h1>Ask the AI Tutor</h1>
<form method="POST" class="ask-form">
    <textarea name="question" placeholder="Type your question here..." required></textarea>
    <button type="submit" class="btn-primary">Ask</button>
</form>

{% if answer %}
<div class="answer-box">
    <h3>Answer</h3>
    <p>{{ answer }}</p>
</div>
{% endif %}
{% endblock %}
